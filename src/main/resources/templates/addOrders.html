<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive food menu with cart functionality">
    <title>Mom'S Kitchen- Food Menu</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>

        <div class="header-content">
            <a href="/waiter/dashboard" class="back-to-tables">
            ← Tables Dashboard
            </a>
            <h1> MENU </h1>
        </div>

    </header>

    <main>

        <nav class="toggle-buttons" aria-label="Menu navigation">
            <button class="toggle active" onclick="showMenu()" aria-current="page">Food Menu</button>
            <button class="toggle" onclick="showCart()">
                Your Cart 
                <span id="cart-count" class="cart-badge">0</span>
            </button>
        </nav>

        <!-- Food Menu Section -->
        <section id="food-menu-slider" class="menu-section">
            <!-- Content will be dynamically loaded from JavaScript -->
        </section>

        <!-- Cart Section -->
        <section id="cart" class="cart-container" aria-labelledby="cart-heading">
            <h2 id="cart-heading">Your Cart</h2>
            <div class="cart-content">
                <table id="cart-table" class="cart-table">
                    <thead>
                        <tr>
                            <th scope="col">Item</th>
                            <th scope="col">Price</th>
                            <th scope="col">Quantity</th>
                            <th scope="col">Total</th>
                            <th scope="col">Comments</th>
                            <th scope="col">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Cart items will be dynamically added here -->
                    </tbody>
                </table>
                <div id="total-price" class="total-price">Total: $0.00</div>
                <button id="checkout-btn" class="payment-button" onclick="updateOrders()">
                    <span class="btn-content">
                        Proceed to Checkpoint 
                        <span class="icon">⚡</span>
                    </span>
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 UIS Gamer's Grill. All rights reserved.</p>
    </footer>

    <script src="/js/order.js"></script>
</body>
</html>
