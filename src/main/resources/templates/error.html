<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Dish Not Found</title>
  <style>
    body {
      background-color: #fff8f0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      padding: 50px;
      color: #333;
    }

    h1 {
      font-size: 5em;
      margin-bottom: 0.2em;
    }

    .emoji {
      font-size: 4em;
      animation: wiggle 1s infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    p {
      font-size: 1.5em;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;
      color: #ff6347;
      font-weight: bold;
      border: 2px solid #ff6347;
      padding: 10px 20px;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #ff6347;
      color: white;
    }
  </style>
</head>
<body>
  <div class="emoji">🍝</div>
  <h1>404</h1>
  <p>Oops! try again!!!.</p>
  
  <th:block th:if="${msg}">
    <p class="text-center fs-3 text-danger" th:text="${msg}"></p>
</th:block>
 

  <script>
    // 🍱 Random food emoji
    const foods = ['🍕', '🍔', '🍣', '🍜', '🥗', '🌮', '🍩', '🥐', '🍤', '🥟'];
    document.querySelector('.emoji').textContent =
      foods[Math.floor(Math.random() * foods.length)];

    // 🍳 Sassy chef alert
    setTimeout(() => {
      alert("This page is burnt. Try a different one, yeah?");
    }, 3000);

    // 🚪 Auto-redirect after 10 seconds
    setTimeout(() => {
      window.location.href = "/";
    }, 10000);
  </script>
</body>
</html>
