<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom'S Kitchen - Host Dashboard</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="/css/host-dashboard.css" rel="stylesheet">
</head>
<body>
	<div class="host-container">
		<header class="host-header">
			<h1>
				<i class="fas fa-utensils"></i> Host Dashboard
			</h1>
			<div class="header-controls">

				<button class="btn btn-outline-dark"
					onclick="window.location.href='/'">
					<i class="fas fa-sign-out-alt"></i> Logout
				</button>
		</header>
		<button id="greetBtn" class="btn btn-filter">Greet Customer</button>
		<br>
		<div id="greetMessage" style="display: none;">👋 Hello! Welcome
			to Mom's Kitchen. Your table will be ready shortly.</div>

		<div class="dashboard-controls">
			<div class="search-box">
				<i class="fas fa-search"></i> <input type="text"
					placeholder="Search tables...">
			</div>
			<div class="filter-buttons">

				<button class="btn btn-filter active" data-filter="all">All
					Tables</button>
				<button class="btn btn-filter" data-filter="occupied">Occupied</button>
				<button class="btn btn-filter" data-filter="open">Open</button>



			</div>
		</div>

		<div class="tables-grid" id="tables-container">
			<!-- Tables will be dynamically inserted here -->
		</div>

		<!-- Table Details Modal -->
		<div class="modal fade" id="tableDetailsModal" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							Table <span id="modal-table-number"></span> Details
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<div class="table-info">
							<p>
								<strong>Status:</strong> <span id="modal-table-status"></span>
							</p>
							<p>
								<strong>Capacity:</strong> <span id="modal-table-capacity"></span>
							</p>
							<p>
								<strong>Server:</strong> <span id="modal-table-server"></span>
							</p>
							<p>
								<strong>Time Seated:</strong> <span id="modal-table-time"></span>
							</p>
							<p>
								<strong>Special Notes:</strong> <span id="modal-table-notes"></span>
							</p>
						</div>
						<div class="modal-actions mt-3">
							<button class="btn btn-primary" id="modal-send-customer">
								<i class="fas fa-user-plus"></i> Send Customer
							</button>
							<button class="btn btn-warning" id="modal-mark-open">
								<i class="fas fa-door-open"></i> Mark as Open
							</button>

						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/host-dashboard.js"></script>
</body>
</html>
