<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Website</title>
    <link rel="stylesheet" href="/css/restaurant.css">
</head>
<body>
    <div class="container">
        <!-- Navbar with logo and navigation links -->
        <!-- <nav class="navbar">
            <div class="logo">MOM'S KITCHEN</div>
            <ul class="nav-links"></ul>
        </nav> -->

        <!-- Hero content with heading and description -->
        <div class="content">
            <h1>HOME-STYLE  <br> COOKING <br>NOURISHING FOOD</h1>
            <p class="description">A RESTAURANT THAT FEELS LIKE HOME, SERVING WHOLESOME MEALS THAT NOURISH BOTH BODY AND SOUL.</p>
            <button class="btn" id="loginBtn">LOG IN</button>
            <button class="btn" id="signupBtn">SIGN UP</button>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container" id="loginForm">
    <div class="login-form">
    	 <button class="close-btn" id="closeLogin">&times;</button>
		
			<h2>Login</h2>
        <form action="/loginUser" method="post" id="loginFormElement">
            <div class="input-group">
                <label for="employeeId">EmployeeID</label>
                <input type="text" id="employeeid" name="employeeid" placeholder="Enter your Employee Id" required>
            </div>
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
       
            <button class="btn" type="submit"  id="submitLoginBtn">Login</button>
        </form>
        <p class="signup-link">Don't have an account? <a href="#" id="toSignup">Sign Up</a></p>
    </div>
</div>

    <!-- Sign Up Form -->
    <div class="login-container" id="signupForm">
    <div class="login-form">
     <button class="close-btn" id="closeSignup">&times;</button>
        <h2>Sign Up</h2>
        <form action="/createUser" method="post" id="signupFormElement">
            <div class="input-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signuppassword" name="password" placeholder="Enter your password">
            </div>
            <div class="input-group">
                <label for="signupPassword">Confirm Password</label>
                <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Confirm your password">
            </div>
         <div class="input-group">
                <label for="roles">Choose your role:</label>
                <select id="role" name="role">
                    <option value="Chef">Chef</option>
                    <option value="Waiter">Waiter</option>
                    <option value="Manager">Manager</option>
                    <option value="Host">Host</option>
                </select>
            </div>
            <button class="btn" id="submitSignupBtn">Sign Up</button>
        </form>
        <p class="signup-link">Already have an account? <a href="#" id="toLogin">Log In</a></p>
    </div>
</div>


 <script src="/js/restaurant.js"></script> 
</body>
</html>
