<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/chef-dashboard.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Chef Dashboard</a>
            <div>
                <button id="sound-toggle" class="btn btn-outline-light me-2">🔔 Sound On</button>
                <a href="/" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between mb-3">
            <h2>Orders List</h2>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Table</th>
                    <th>Items</th>
                     <th>Quantity</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Comments</th>
                    <th>Actions</th>
                </tr>
            </thead>
             <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.tableNumber}"></td>
                    <td th:text="${order.name}"></td>
                    <td th:text="${order.quantity}"></td>
                     <td th:text="${order.status}"></td>
                   <td>
                       
                         <input type="number" th:value="${order.priority}" min="0" max="3"
       					  th:oninput="'updatePriority(' + ${order.id} + ', this.value)'" />
                               
                    </td>
                    <td th:text="${order.comment}"></td>
                    <td>
                        <button class="btn btn-warning btn-sm" 
                        	   th:if="${order.status} != 'In-Progress'"
                               th:onclick="'updateStatus(' + ${order.id} + ', \'In-Progress\')'">
                            In Progress
                        </button>
                        <button class="btn btn-success btn-sm" 
                        		th:if="${order.status} == 'In-Progress'"
                                th:onclick="'updateStatus(' + ${order.id} + ', \'Done\')'">
                            Done
                        </button>
                        </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Order Details Modal -->
    <div class="modal fade" id="orderDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Order Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="order-details-content">
                    <!-- Content will be inserted here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/chef-dashboard.js"></script>
</body>
</html>
